# Compiles Kotlin/Native iOS targets (requires macOS + Xcode). Linux CI cannot replace this job.
name: library-ios-compile

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ios-simulator-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle compile iOS simulator arm64
        run: ./gradlew :library:compileKotlinIosSimulatorArm64 --no-daemon --stacktrace

  composeapp-ios-simulator-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle compile composeApp iOS simulator arm64
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --no-daemon --stacktrace

  # Builds the checked-in Xcode sample (iosApp/AppDimensSample.xcodeproj). Only on default branch to save CI minutes.
  ios-sample-xcodebuild:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: xcodebuild AppDimensSample (simulator)
        working-directory: iosApp
        env:
          CODE_SIGNING_ALLOWED: NO
        run: xcodebuild -project AppDimensSample.xcodeproj -scheme AppDimensSample -configuration Debug -destination 'generic/platform=iOS Simulator' -quiet build
