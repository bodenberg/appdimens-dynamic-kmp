# Static validation of iosMain Kotlin (no Xcode). Runs on Linux PRs.
name: validate-kmp-ios

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ios-main-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate iosMain / Swift (if present)
        run: python3 scripts/validate_kmp_ios.py
